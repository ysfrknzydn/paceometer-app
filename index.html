<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Paceometer</title>

  <!-- PWA / home screen behavior -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0b0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Paceometer">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="auth-screen" class="screen">
    <h1 class="brand">Paceometer</h1>
    <form id="auth-form" class="auth-form">
      <input id="email" type="email" placeholder="Email" autocomplete="email" required>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required minlength="6">
      <button id="auth-submit" type="submit">Sign in</button>
    </form>
    <button id="auth-toggle" class="link-btn" type="button">Need an account? Sign up</button>
    <p id="auth-error" class="auth-error"></p>
  </div>

  <main id="app" class="screen hidden">
    <button id="sign-out" class="sign-out" type="button">Sign out</button>
    <div id="status" class="status">searching for GPS…</div>
    <div id="speed" class="speed">--</div>
    <div id="unit" class="unit">mph</div>
    <button id="trip-btn" class="trip-btn" type="button">Start Trip</button>
    <div id="trip-status" class="trip-status"></div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
