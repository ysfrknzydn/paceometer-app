<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Paceometer</title>

  <!-- PWA / home screen behavior -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0b0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Paceometer">

  <link rel="stylesheet" href="css/style.css">

  <script>
    // iOS Safari has a long-standing bug where it fails to recompute the
    // layout viewport after a rotation, leaving the page rendered at the
    // pre-rotation scale until something forces a relayout -- it reads as
    // "zoomed in" after flipping the phone on its side. Nudging
    // initial-scale off 1 and immediately back forces that relayout.
    (function () {
      var viewport = document.querySelector('meta[name="viewport"]');
      var base = viewport.getAttribute("content");
      window.addEventListener("orientationchange", function () {
        viewport.setAttribute(
          "content",
          base.replace("initial-scale=1", "initial-scale=1.0001")
        );
        requestAnimationFrame(function () {
          viewport.setAttribute("content", base);
        });
      });
    })();
  </script>
</head>
<body>
  <div id="auth-screen" class="screen">
    <h1 class="brand">Paceometer</h1>
    <form id="auth-form" class="auth-form">
      <input id="email" type="email" placeholder="Email" autocomplete="email" required>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required minlength="6">
      <button id="auth-submit" type="submit">Sign in</button>
    </form>
    <button id="auth-toggle" class="link-btn" type="button">Need an account? Sign up</button>
    <p id="auth-error" class="auth-error"></p>
  </div>

  <main id="app" class="screen hidden">
    <button id="sign-out" class="sign-out" type="button">Sign out</button>
    <div id="status" class="status">searching for GPS…</div>
    <div id="readout" class="readout">
      <div id="speed" class="speed">--</div>
      <div id="unit" class="unit">mph</div>
      <div id="pace" class="pace">--</div>
      <div id="zone-indicator" class="zone-indicator">
        <div id="zone-state" class="zone-state">--</div>
        <div id="zone-caption" class="zone-caption"></div>
        <div id="zone-value" class="zone-value">--</div>
      </div>
    </div>
    <div id="trip-controls" class="trip-controls">
      <button id="trip-btn" class="trip-btn" type="button">Start Trip</button>
      <div id="trip-status" class="trip-status"></div>
      <div id="trip-zone-progress" class="trip-zone-progress"></div>
      <div id="trip-zone-progress-time" class="trip-zone-progress-time"></div>
      <!-- Dev tool for testing indoors without driving. Remove this block
           (dropdown + button + progress bar) along with its app.js code
           (search "DEV TOOL") before shipping to real study participants --
           see CLAUDE.md pre-launch checklist. -->
      <div id="simulate-controls" class="simulate-controls">
        <select id="simulate-profile" class="simulate-profile">
          <option value="full">Full range</option>
          <option value="residential">Residential</option>
          <option value="innerCity">Inner city</option>
          <option value="highway">Highway</option>
          <option value="rural">Rural</option>
        </select>
        <button id="simulate-btn" class="simulate-btn" type="button">Start Simulated Drive</button>
      </div>
      <div id="simulate-progress" class="simulate-progress hidden">
        <div id="simulate-progress-fill" class="simulate-progress-fill"></div>
      </div>
    </div>
    <!-- Accessory Feature: end-of-trip summary, inline-swapped in place of
         #readout/#trip-controls when a trip ends (see showTripSummary in
         app.js). Deliberately just the one zone-percentage number -- no
         historical trends, no vs-speed comparison. -->
    <div id="trip-summary" class="trip-summary hidden">
      <div class="trip-summary-heading">Trip complete</div>
      <div id="trip-summary-value" class="trip-summary-value">--</div>
      <div id="trip-summary-caption" class="trip-summary-caption"></div>
      <div id="trip-summary-detail" class="trip-summary-detail"></div>
      <div id="trip-summary-save-status" class="trip-summary-save-status"></div>
      <button id="trip-summary-dismiss" class="trip-btn" type="button">Continue Driving</button>
    </div>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
